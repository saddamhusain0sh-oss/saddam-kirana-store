<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SADDAM KIRANA STORE</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6ff}

/* header */
header{display:flex;align-items:center;padding:15px;background:#222;color:white}
header img{width:50px;height:50px;border-radius:50%;margin-right:10px}
header h1{font-size:26px;margin:0}

/* language */
.lang{margin-left:auto}
.lang button{margin-left:5px}

/* slider */
.slider{width:100%;height:160px;overflow:hidden}
.slider img{width:100%;height:160px;object-fit:cover}

/* search */
.search{width:90%;margin:10px;padding:10px;font-size:16px}

/* categories */
.categories{padding:10px}
.categories button{margin:4px;padding:6px 10px}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:10px}
.card{background:white;border-radius:10px;padding:10px;text-align:center}
.card img{width:100%;height:120px;object-fit:cover;border-radius:6px}

/* modal product */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:white;display:none;flex-direction:column}
.modal img{width:100%;height:60vh;object-fit:cover}
.modal .info{padding:15px}

/* admin */
.admin{display:none;padding:20px}
.admin input{display:block;margin:5px 0;padding:5px}
</style>
</head>
<script>
function autoImage(name){
  return "https://source.unsplash.com/400x400/?" + name;
}
</script>
<body>

<header>
<img id="ownerPhoto" src="">
<h1>SADDAM KIRANA STORE</h1>
<div class="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('hi')">HI</button>
</div>
</header>

<div class="slider">
<img src="https://images.unsplash.com/photo-1607082349566-187342175e2f">
</div>

<input id="search" class="search" placeholder="Search">

<div class="categories" id="cats"></div>

<div class="grid" id="products"></div>

<div class="modal" id="modal">
<img id="modalImg">
<div class="info">
<h2 id="modalName"></h2>
<p id="modalPrice"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<div class="admin" id="admin">
<h2>ADMIN PANEL</h2>

<input id="catName" placeholder="Category name">
<button onclick="addCategory()">Add Category</button>

<hr>

<input id="pNameEn" placeholder="Product name English">
<input id="pNameHi" placeholder="Product name Hindi">
<input id="pPrice" placeholder="Price (optional)">
<input id="pCat" placeholder="Category">
<input id="pImages" placeholder="Image links comma separated">

<button onclick="addProduct()">Add Product</button>
</div>

<script>

let lang="en"

let categories = JSON.parse(localStorage.getItem("categories")) || [];
let products = JSON.parse(localStorage.getItem("products")) || [];

function setLang(l){
lang=l
render()
}

function addCategory(){
let c=document.getElementById("catName").value
categories.push(c)

localStorage.setItem("categories",JSON.stringify(categories))

render()
}

function addProduct(){

let p={
name_en:document.getElementById("pNameEn").value,
name_hi:document.getElementById("pNameHi").value,
price:document.getElementById("pPrice").value,
cat:document.getElementById("pCat").value,
imgs: document.getElementById("pImages").value
? document.getElementById("pImages").value.split(",")
: [`https://source.unsplash.com/600x400/?${document.getElementById("pNameEn").value}`]
}

products.push(p)
localStorage.setItem("products",JSON.stringify(products))
render()

function render(){

let catHTML=""

categories.forEach(c=>{
catHTML+=`<button onclick="filter('${c}')">${c}</button>`
})

document.getElementById("cats").innerHTML=catHTML

show(products)

}

function show(list){

let html=""

list.forEach((p,i)=>{

let name=lang=="en"?p.name_en:p.name_hi

html+=`
<div class="card" onclick="openProduct(${i})">
<img src="${p.imgs[0]}">
<h4>${name}</h4>
${p.price?`<p>₹${p.price}</p>`:""}
</div>
`

})

document.getElementById("products").innerHTML=html

}

function filter(cat){

let r=products.filter(p=>p.cat==cat)
show(r)

}

document.getElementById("search").oninput=function(){

let t=this.value.toLowerCase()

let r=products.filter(p=>
p.name_en.toLowerCase().includes(t)||
p.name_hi.toLowerCase().includes(t)
)

show(r)

}

function openProduct(i){

let p=products[i]

document.getElementById("modal").style.display="flex"

document.getElementById("modalImg").src=p.imgs[0]

document.getElementById("modalName").innerText=
lang=="en"?p.name_en:p.name_hi

document.getElementById("modalPrice").innerText=
p.price?`₹${p.price}`:""

}

function closeModal(){
document.getElementById("modal").style.display="none"
}

if(location.hash=="#admin"){
document.getElementById("admin").style.display="block"
}

render()

</script>

</body>
</html>
