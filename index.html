<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>SADDAM KIRANA STORE</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

header{
background:black;
color:white;
text-align:center;
padding:15px;
}

.search{
width:90%;
padding:10px;
margin:10px;
font-size:16px;
}

.buttons{
text-align:center;
margin:10px;
}

.buttons button{
padding:8px;
margin:4px;
border:none;
background:#ddd;
border-radius:6px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:6px;
}

.price{
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<header>
<h2>SADDAM KIRANA STORE</h2>
<p>Bakar Nagar</p>
</header>

<input id="search" class="search" placeholder="Search product...">

<div class="buttons">

<button onclick="filter('all')">All</button>
<button onclick="filter('kirana')">Kirana</button>
<button onclick="filter('snacks')">Snacks</button>
<button onclick="filter('electronics')">Electronics</button>

</div>

<div id="products" class="grid"></div>

<script>

let items=[

{name:"Aashirvaad Atta",price:45,cat:"kirana",img:"https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b"},

{name:"Basmati Rice",price:72,cat:"kirana",img:"https://images.unsplash.com/photo-1586201375761-83865001e31b"},

{name:"Toor Dal",price:128,cat:"kirana",img:"https://images.unsplash.com/photo-1515543904379-3d757afe72e4"},

{name:"LED Bulb",price:85,cat:"electronics",img:"https://images.unsplash.com/photo-1513467655676-561b7d489a88"},

{name:"Mobile Charger",price:149,cat:"electronics",img:"https://images.unsplash.com/photo-1585336261022-680e295ce3fe"},

{name:"Parle G Biscuit",price:10,cat:"snacks",img:"https://images.unsplash.com/photo-1589985270958-b3f1f2c7fd6f"}

]

function show(list){

let html=""

list.forEach(p=>{

html+=`

<div class="card">

<img src="${p.img}">

<h4>${p.name}</h4>

<p class="price">₹${p.price}</p>

</div>

`

})

document.getElementById("products").innerHTML=html

}

show(items)

document.getElementById("search").oninput=function(){

let text=this.value.toLowerCase()

let result=items.filter(p=>p.name.toLowerCase().includes(text))

show(result)

}

function filter(cat){

if(cat=="all"){

show(items)

return

}

let result=items.filter(p=>p.cat==cat)

show(result)

}

</script>

</body>

</html>
