<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SADDAM KIRANA STORE</title>

<style>

body{font-family:Arial;margin:0;background:#f4f6ff}

header{
display:flex;
align-items:center;
background:#222;
color:white;
padding:10px
}

header img{
width:45px;
height:45px;
border-radius:50%;
margin-right:10px
}

.lang{margin-left:auto}

.lang button{
margin-left:5px;
padding:4px 8px
}

.activeLang{
background:green;
color:white
}

.search{
width:90%;
margin:10px;
padding:10px
}

.categories{
padding:10px
}

.categories button{
margin:4px;
padding:6px 10px
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
padding:10px
}

.card{
background:white;
padding:10px;
border-radius:8px;
text-align:center
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:6px
}

.admin{
display:none;
background:white;
margin:10px;
padding:15px;
border-radius:8px
}

.admin input,.admin select{
width:95%;
padding:6px;
margin:5px 0
}

.highlight{
animation:blink 0.4s 2
}

@keyframes blink{
0%{background:#b6ffb6}
50%{background:white}
100%{background:#b6ffb6}
}

.small{font-size:11px}

</style>
</head>

<body>

<header>

<img id="ownerImg">

<h2>SADDAM KIRANA STORE</h2>

<div class="lang">

<button id="btnEn" onclick="setLang('en')">English ✔</button>
<button id="btnHi" onclick="setLang('hi')">हिन्दी</button>

</div>

</header>


<input id="search" class="search" placeholder="Search">

<div class="categories" id="cats"></div>

<div class="grid" id="products"></div>



<div class="admin" id="admin">

<h3>ADMIN PANEL</h3>

<b>Owner Photo</b>
<input type="file" onchange="uploadOwner(event)">

<hr>

<div id="catSection">

<b>Category</b>

<input id="catEn" placeholder="Category English">
<input id="catHi" placeholder="Category Hindi">

<button onclick="addCategory()">Save Category</button>

</div>

<hr>

<div id="prodSection">

<b>Product</b>

<input id="pEn" placeholder="Product English">
<input id="pHi" placeholder="Product Hindi">

<input id="pPrice" placeholder="Price">

<select id="pCat"></select>

<input id="pImg" placeholder="Image link optional">

<button onclick="addProduct()">Save Product</button>

</div>

</div>


<script>

let lang="en"

let categories=JSON.parse(localStorage.getItem("cats"))||[
{en:"Kirana",hi:"किराना"},
{en:"Snacks",hi:"स्नैक्स"},
{en:"Electronics",hi:"इलेक्ट्रॉनिक्स"},
{en:"Cosmetics",hi:"कॉस्मेटिक्स"}
]

let products=JSON.parse(localStorage.getItem("prods"))||[
{en:"Maggi",hi:"मैगी",price:14,cat:"Snacks",img:""},
{en:"Biscuit",hi:"बिस्किट",price:10,cat:"Snacks",img:""},
{en:"LED Bulb",hi:"एलईडी बल्ब",price:80,cat:"Electronics",img:""}
]

function save(){
localStorage.setItem("cats",JSON.stringify(categories))
localStorage.setItem("prods",JSON.stringify(products))
}

function setLang(l){

lang=l

document.getElementById("btnEn").innerText=
l=="en"?"English ✔":"English"

document.getElementById("btnHi").innerText=
l=="hi"?"हिन्दी ✔":"हिन्दी"

render()

}

function transliterate(t){

return t
.replace(/a/g,"अ")
.replace(/b/g,"ब")
.replace(/c/g,"क")
.replace(/d/g,"द")
.replace(/e/g,"ए")
.replace(/f/g,"फ")
.replace(/g/g,"ग")
.replace(/h/g,"ह")
.replace(/i/g,"इ")
.replace(/l/g,"ल")
.replace(/m/g,"म")
.replace(/n/g,"न")
.replace(/o/g,"ओ")
.replace(/p/g,"प")
.replace(/r/g,"र")
.replace(/s/g,"स")
.replace(/t/g,"ट")
.replace(/u/g,"उ")
}

document.getElementById("catEn").oninput=function(){
document.getElementById("catHi").value=transliterate(this.value)
}

document.getElementById("pEn").oninput=function(){
document.getElementById("pHi").value=transliterate(this.value)
}

function renderCats(){

let html=""

categories.forEach((c,i)=>{

let name=lang=="en"?c.en:c.hi

html+=`<button onclick="filter('${c.en}')">${name}</button>`

if(isAdmin)
html+=` <button class="small" onclick="editCat(${i})">Edit</button>
<button class="small" onclick="deleteCat(${i})">X</button>`

})

document.getElementById("cats").innerHTML=html

let sel=document.getElementById("pCat")

sel.innerHTML=""

categories.forEach(c=>{
sel.innerHTML+=`<option>${c.en}</option>`
})

}

function renderProducts(list){

let html=""

list.forEach((p,i)=>{

let name=lang=="en"?p.en:p.hi

let img=p.img||`https://source.unsplash.com/400x300/?${p.en}`

html+=`<div class="card">

<img src="${img}">

<h4>${name}</h4>

<p>₹${p.price}</p>`

if(isAdmin)
html+=`<button class="small" onclick="editProduct(${i})">Edit</button>
<button class="small" onclick="deleteProduct(${i})">Delete</button>`

html+=`</div>`

})

document.getElementById("products").innerHTML=html

}

function render(){

renderCats()

renderProducts(products)

}

function filter(cat){

let r=products.filter(p=>p.cat==cat)

renderProducts(r)

}

function highlight(el){

el.classList.add("highlight")

setTimeout(()=>el.classList.remove("highlight"),800)

}

function addCategory(){

let en=document.getElementById("catEn").value
let hi=document.getElementById("catHi").value

categories.push({en,hi})

save()
render()

document.getElementById("catEn").value=""
document.getElementById("catHi").value=""

}

function deleteCat(i){

categories.splice(i,1)

save()
render()

}

function editCat(i){

let c=categories[i]

document.getElementById("catEn").value=c.en
document.getElementById("catHi").value=c.hi

categories.splice(i,1)

let sec=document.getElementById("catSection")

sec.scrollIntoView()

highlight(sec)

}

function addProduct(){

let p={

en:document.getElementById("pEn").value,
hi:document.getElementById("pHi").value,
price:document.getElementById("pPrice").value,
cat:document.getElementById("pCat").value,
img:document.getElementById("pImg").value

}

products.push(p)

save()
render()

document.getElementById("pEn").value=""
document.getElementById("pHi").value=""
document.getElementById("pPrice").value=""
document.getElementById("pImg").value=""

}

function deleteProduct(i){

products.splice(i,1)

save()
render()

}

function editProduct(i){

let p=products[i]

document.getElementById("pEn").value=p.en
document.getElementById("pHi").value=p.hi
document.getElementById("pPrice").value=p.price
document.getElementById("pImg").value=p.img

products.splice(i,1)

let sec=document.getElementById("prodSection")

sec.scrollIntoView()

highlight(sec)

}

document.getElementById("search").oninput=function(){

let t=this.value.toLowerCase()

let r=products.filter(p=>
p.en.toLowerCase().includes(t)||
p.hi.includes(t)
)

renderProducts(r)

}

function uploadOwner(e){

let r=new FileReader()

r.onload=function(){

localStorage.setItem("owner",r.result)

document.getElementById("ownerImg").src=r.result

}

r.readAsDataURL(e.target.files[0])

}

let owner=localStorage.getItem("owner")

if(owner) document.getElementById("ownerImg").src=owner

let isAdmin=false

if(location.hash=="#admin"){
isAdmin=true
document.getElementById("admin").style.display="block"
}

render()

</script>

</body>
</html>
