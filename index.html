<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SADDAM KIRANA STORE</title>

<style>
body{
font-family:Arial;
background:#f3f3f3;
margin:0;
}

header{
background:#111;
color:white;
text-align:center;
padding:15px;
}

.search{
width:90%;
padding:10px;
margin:15px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

.price{
color:green;
font-weight:bold;
}
</style>

</head>

<body>

<header>
<h2>SADDAM KIRANA STORE</h2>
<p>Bakar Nagar</p>
</header>

<input class="search" placeholder="Search product...">

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1586201375761-83865001e31b">
<h4>Basmati Rice</h4>
<p class="price">₹72</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b">
<h4>Aashirvaad Atta</h4>
<p class="price">₹45</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1515543904379-3d757afe72e4">
<h4>Toor Dal</h4>
<p class="price">₹128</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1513467655676-561b7d489a88">
<h4>LED Bulb</h4>
<p class="price">₹85</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585336261022-680e295ce3fe">
<h4>Mobile Charger</h4>
<p class="price">₹149</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1589985270958-b3f1f2c7fd6f">
<h4>Parle G Biscuit</h4>
<p class="price">₹10</p>
</div>

</div>

</body>
</html>
