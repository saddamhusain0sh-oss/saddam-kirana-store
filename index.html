<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SADDAM KIRANA STORE</title>

<style>

body{font-family:Arial;margin:0;background:#f4f6ff}

header{display:flex;align-items:center;background:#222;color:white;padding:10px}

header img{width:45px;height:45px;border-radius:50%;margin-right:10px}

.lang{margin-left:auto}

.search{width:90%;margin:10px;padding:10px}

.categories{padding:10px}

.categories button{margin:4px;padding:6px 10px}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
padding:10px
}

.card{background:white;padding:10px;border-radius:8px;text-align:center}

.card img{width:100%;height:120px;object-fit:cover;border-radius:6px}

.admin{background:white;margin:10px;padding:15px;border-radius:8px}

.admin input,.admin select{width:95%;padding:6px;margin:5px 0}

.small{font-size:11px}

</style>
</head>

<body>

<header>

<img id="ownerImg" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<h2>SADDAM KIRANA STORE</h2>

<div class="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('hi')">HI</button>
</div>

</header>


<input id="search" class="search" placeholder="Search product">


<div class="categories" id="cats"></div>


<div class="grid" id="products"></div>


<div class="admin" id="admin" style="display:none">

<h3>ADMIN PANEL</h3>

<b>Owner Photo</b>

<input type="file" onchange="uploadOwner(event)">

<hr>

<b>Add / Edit Category</b>

<input id="catEn" placeholder="Category English">

<input id="catHi" placeholder="Category Hindi">

<button onclick="addCategory()">Save Category</button>

<hr>

<b>Add / Edit Product</b>

<input id="pEn" placeholder="Product English">

<input id="pHi" placeholder="Product Hindi">

<input id="pPrice" placeholder="Price">

<select id="pCat"></select>

<input id="pImg" placeholder="Image link optional">

<button onclick="addProduct()">Save Product</button>

</div>


<script>

let lang="en"

let categories=JSON.parse(localStorage.getItem("cats"))||[]

let products=JSON.parse(localStorage.getItem("prods"))||[]

let owner=localStorage.getItem("owner")

if(owner) document.getElementById("ownerImg").src=owner


function save(){

localStorage.setItem("cats",JSON.stringify(categories))
localStorage.setItem("prods",JSON.stringify(products))

}


function setLang(l){

lang=l
render()

}


function transliterate(text){

let map={
a:"अ",b:"ब",c:"क",d:"द",e:"ए",f:"फ",g:"ग",h:"ह",i:"इ",
j:"ज",k:"क",l:"ल",m:"म",n:"न",o:"ओ",p:"प",q:"क",r:"र",
s:"स",t:"ट",u:"उ",v:"व",w:"व",x:"क्स",y:"य",z:"ज"
}

let r=""

text.toLowerCase().split("").forEach(ch=>{

r+=map[ch]||ch

})

return r

}


document.getElementById("catEn").oninput=function(){

document.getElementById("catHi").value=transliterate(this.value)

}


document.getElementById("pEn").oninput=function(){

document.getElementById("pHi").value=transliterate(this.value)

}


function renderCats(){

let html=""

categories.forEach((c,i)=>{

let name=lang=="en"?c.en:c.hi

html+=`
<button onclick="filter('${c.en}')">${name}</button>
<button class="small" onclick="editCat(${i})">Edit</button>
<button class="small" onclick="deleteCat(${i})">X</button>
`

})

document.getElementById("cats").innerHTML=html


let sel=document.getElementById("pCat")

sel.innerHTML=""

categories.forEach(c=>{

sel.innerHTML+=`<option>${c.en}</option>`

})

}


function renderProducts(list){

let html=""

list.forEach((p,i)=>{

let name=lang=="en"?p.en:p.hi

let img=p.img?p.img:`https://source.unsplash.com/400x300/?${p.en}`

html+=`

<div class="card">

<img src="${img}">

<h4>${name}</h4>

<p>₹${p.price}</p>

<button class="small" onclick="editProduct(${i})">Edit</button>

<button class="small" onclick="deleteProduct(${i})">Delete</button>

</div>

`

})

document.getElementById("products").innerHTML=html

}


function render(){

renderCats()
renderProducts(products)

}


function filter(cat){

let r=products.filter(p=>p.cat==cat)

renderProducts(r)

}


function addCategory(){

let en=document.getElementById("catEn").value
let hi=document.getElementById("catHi").value

categories.push({en,hi})

save()
render()

document.getElementById("catEn").value=""
document.getElementById("catHi").value=""

window.scrollTo({top:0,behavior:"smooth"})

}


function deleteCat(i){

categories.splice(i,1)

save()
render()

}


function editCat(i){

let c=categories[i]

document.getElementById("catEn").value=c.en
document.getElementById("catHi").value=c.hi

categories.splice(i,1)

window.location.hash="#admin"
window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"})

}


function addProduct(){

let p={

en:document.getElementById("pEn").value,
hi:document.getElementById("pHi").value,
price:document.getElementById("pPrice").value,
cat:document.getElementById("pCat").value,
img:document.getElementById("pImg").value

}

products.push(p)

save()
render()

document.getElementById("pEn").value=""
document.getElementById("pHi").value=""
document.getElementById("pPrice").value=""
document.getElementById("pImg").value=""

window.scrollTo({top:0,behavior:"smooth"})

}


function deleteProduct(i){

products.splice(i,1)

save()
render()

}


function editProduct(i){

let p=products[i]

document.getElementById("pEn").value=p.en
document.getElementById("pHi").value=p.hi
document.getElementById("pPrice").value=p.price
document.getElementById("pImg").value=p.img

products.splice(i,1)

window.location.hash="#admin"
window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"})

}


function uploadOwner(e){

let reader=new FileReader()

reader.onload=function(){

localStorage.setItem("owner",reader.result)

document.getElementById("ownerImg").src=reader.result

}

reader.readAsDataURL(e.target.files[0])

}


document.getElementById("search").oninput=function(){

let t=this.value.toLowerCase()

let r=products.filter(p=>p.en.toLowerCase().includes(t)||p.hi.includes(t))

renderProducts(r)

}


if(location.hash=="#admin"){
document.getElementById("admin").style.display="block"
}

render()

</script>

</body>
</html>
